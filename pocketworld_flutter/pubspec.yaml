name: pocketworld_flutter
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.11.5

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # ARB-based localization. lib/l10n/app_{en,zh}.arb get codegen'd via
  # `flutter gen-l10n` (triggered by `flutter pub get` because of
  # `flutter.generate: true` below) into AppLocalizations.
  intl: any

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  # P3.4: dart:ffi binding to aether_cpp's C ABI (aether_version_string).
  # Provides Pointer<Utf8>.toDartString() and friends.
  ffi: ^2.1.4
  # shared_preferences removed 2026-04-27 — iOS 26.3.1 direct-launch
  # crash in SharedPreferencesPlugin.register(with:) metadata race.
  # Replaced by lib/aether_prefs.dart + ios/Runner/AetherPrefsPlugin.swift.
  vector_math: ^2.2.0

  # 2026-04-28: replaced firebase_core / firebase_auth with Supabase
  # Auth + Postgres. We keep the same lib/auth/ AuthService protocol so
  # the UI layer is provider-agnostic — Firebase services / options /
  # GoogleService-Info.plist all removed.
  supabase_flutter: ^2.8.0

  # Pipeline / upload broker HTTP client.
  dio: ^5.7.0

  # Background-capable file uploads (presigned-PUT to S3-style URLs).
  # Used by aether_api_client.putFile/putBytes — replaces the prior
  # foreground-only dio path that silently aborted when the user
  # backgrounded the app or locked the screen mid-upload.
  # On iOS this wraps URLSessionConfiguration.background, so uploads
  # survive app→background, lock screen, and OS memory pressure
  # eviction. Force-quit (swipe-up in App Switcher) still terminates
  # them — that's an iOS platform constraint, not a plugin gap.
  background_downloader: ^9.5.4

  # SHA256 for ArtifactManifest integrity checks.
  crypto: ^3.0.6

  # Temp path for video preparer, artifact download cache.
  path_provider: ^2.1.5

  # Extracts a JPEG frame from the recorded .mov as the scan-card cover
  # thumbnail. Called fire-and-forget from UploadCoordinator after the
  # ScanRecord is persisted, so the gallery card animates from
  # placeholder → real cover within ~500 ms of recording stop.
  # iOS uses AVAssetImageGenerator under the hood; Android uses
  # MediaMetadataRetriever — no additional native config required.
  video_thumbnail: ^0.5.6

  # Phase B community feed — cross-platform 3D renderer.
  # Thermion wraps Google Filament (C++) and renders into a Flutter
  # Texture, so the helmet pixels live inside Flutter's framebuffer
  # — meaning liquid_glass_renderer's GPU shader can SAMPLE them for
  # real refraction. (model_viewer_plus, the previous choice, drew
  # via WKWebView as an iOS hardware overlay; LiquidGlass had no way
  # to read its pixels and the plate fell back to a solid color.)
  #
  # Each ViewerWidget creates its own Filament View / Scene / Camera
  # off the shared FilamentApp instance, so multiple cards can render
  # live 3D simultaneously (matches model_viewer_plus's per-card-WebView
  # behaviour). Throttled by the existing PostCard visibility threshold.
  #
  # Loads .glb at runtime via loadGltfFromBuffer(Uint8List) — bytes are
  # downloaded with dio + cached on disk (lib/community/glb_cache.dart).
  # iOS deployment target must be ≥ 13.0 (already 14.0 in our Podfile).
  thermion_flutter: ^0.3.4

  # Detects when a widget enters / leaves the viewport. Used by the
  # community feed to identify the "centered" PostCard so we can flip
  # its LiveModelView auto-rotate on, and to throttle live-3D mounting
  # (cards far off-screen show a static thumbnail placeholder instead
  # of a Filament viewer).
  visibility_detector: ^0.4.0+2

  # GPU shader-based glass with REAL refraction (refractiveIndex 1.0–2.0,
  # iOS 26 "Liquid Glass" style). Used for the floating info plate over
  # each PostCard's 3D model — translates the demos/glass.html
  # MeshPhysicalMaterial parameters (thickness / IOR / glass color /
  # squircle shape) into Flutter shader settings, far closer to the
  # 3D-physical look than BackdropFilter blur.
  #
  # Caveats:
  #   • Impeller-only (iOS / Android / macOS / HarmonyOS). On Web we
  #     fall back to FakeGlass / BackdropFilter — same package supplies
  #     FakeGlass so the call site swaps cleanly.
  #   • Marked experimental upstream; cap concurrent instances via the
  #     existing PostCard visibility-mount threshold (≤ 2 active).
  liquid_glass_renderer: ^0.2.0-dev.4

  # Capture-side device sensors. We integrate gyroscope deltas + read the
  # accelerometer's gravity vector to drive the dome's yaw/pitch — the
  # `motion_sensors` plugin would have given us absoluteOrientation
  # directly but it's been stale on pub.dev for years (last release 0.1.0
  # in 2019). The Flutter team's `sensors_plus` is the actively maintained
  # alternative; we run a tiny Dart-side complementary filter on its raw
  # streams in lib/capture/orientation_tracker.dart.
  sensors_plus: ^7.0.0

  # Camera preview + per-frame image stream for on-device sharpness
  # (Laplacian variance) gating. CameraImage Y-plane bytes go straight
  # into a `compute()` isolate so the UI thread stays at 60fps.
  camera: ^0.12.0

  # Phase 6: lets the user pick a .glb / .gltf from device storage to
  # feed into ImportGlbCoordinator. Backed by UIDocumentPickerViewController
  # on iOS (Files / iCloud Drive / third-party providers; no Photos
  # permission needed) and SAF / ACTION_OPEN_DOCUMENT on Android.
  file_picker: ^8.1.2


dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # Codegen the ARB files in lib/l10n/ into AppLocalizations on
  # `flutter pub get`. l10n.yaml at project root configures input dir,
  # template language, and output class name.
  generate: true

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/models/DamagedHelmet.glb
    - assets/models/Avocado.glb
    - assets/models/BoomBox.glb
    - assets/models/WaterBottle.glb
    - assets/models/Duck.glb
    - assets/models/Lantern.glb
    # Neutral image-based light for the community viewer.
    # 2.1MB cubemap copied verbatim from Thermion's example assets:
    # https://github.com/nmfisher/thermion/blob/develop/examples/assets/default_env_ibl.ktx
    # We use IBL-only (no directional lights) so PBR materials display
    # close to their baked baseColor — matches Polycam / Luma AI / etc.'s
    # "unlit-style scan viewer" feel without per-primitive material
    # overrides (Thermion 0.3.4 has no MaterialInstance getter to read
    # the original baseColorMap, so true KHR_materials_unlit override
    # while preserving textures isn't expressible via its public API).
    - assets/ibl/default_env_ibl.ktx

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
