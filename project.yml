name: Aether3DApp
options:
  bundleIdPrefix: com.kyle
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.2"
  defaultConfig: Debug
settings:
  base:
    SWIFT_VERSION: "6.0"
targets:
  Aether3DApp:
    type: application
    platform: iOS
    sources:
      - path: App
        type: group
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.kyle.Aether3D
        PRODUCT_NAME: Aether3D
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 8N5Z34UK5Y
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        HEADER_SEARCH_PATHS: ["$(SRCROOT)/aether_cpp/include"]
