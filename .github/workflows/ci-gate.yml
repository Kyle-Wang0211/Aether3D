name: CI Gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gate:
    runs-on: macos-15  # Pinned to prevent runner drift (replaces legacy macos-latest)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Swift 6.2.3 pinning gate
        run: |
          set -euo pipefail
          chmod +x scripts/ci/*.sh
          bash scripts/ci/validate_swift_623_pinning.sh

      - name: Setup Python for compliance gate
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install locked Python dependencies
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install -r server/requirements.lock.txt

      - name: Run CI checks
        run: |
          set -euo pipefail
          chmod +x scripts/ci/*.sh
          bash scripts/ci/run_all.sh
